<!DOCTYPE html>
<html>
<head>
    <title>CORS测试</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>CORS代理测试</h1>
    <div id="result"></div>
    <script>
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?url=',
            'https://thingproxy.freeboard.io/fetch/',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://proxy.cors.sh/',
            'https://cors-anywhere.herokuapp.com/'
        ];
        
        const testUrl = 'https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=1.000001&fields=f2,f3,f14';
        
        async function testProxies() {
            const result = document.getElementById('result');
            for (let i = 0; i < proxies.length; i++) {
                try {
                    const start = Date.now();
                    const res = await fetch(proxies[i] + encodeURIComponent(testUrl));
                    const time = Date.now() - start;
                    if (res.ok) {
                        const data = await res.json();
                        result.innerHTML += `<div style="color:green">✓ 代理${i} OK (${time}ms): ${JSON.stringify(data).substring(0, 100)}</div>`;
                    } else {
                        result.innerHTML += `<div style="color:red">✗ 代理${i} 失败: HTTP ${res.status}</div>`;
                    }
                } catch (e) {
                    result.innerHTML += `<div style="color:red">✗ 代理${i} 错误: ${e.message}</div>`;
                }
            }
        }
        
        testProxies();
    </script>
</body>
</html>
